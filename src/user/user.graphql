type User {
  id: ID
  email: String
  username: String!
  displayName: String
  bio: String
  avatar: String
  cart: Cart!
}

type AuthRes {
  token: String!
  message: String
}

input LoginInput {
  username: String!
  password: String!
}

input SignupInput {
  username: String!
  password: String!
  email: String!
}

extend type Query {
  user: User!
  login(input: LoginInput!): AuthRes!
}

extend type Mutation {
  signup(input: SignupInput!): AuthRes!
}