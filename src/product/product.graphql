type Product {
  id: ID!
  title: String!
  sku: String!
  slug: String!
  subtitle: String
  description: String
  shortDescription: String
  price: Float!
  discountedPrice: Float
  images: [String]!
  tags: [String]
  reviews: [Review]
}

input Paginate {
input ProductsOption {
  page: Int!
  itemsPerPage: Int!
}

input ProductInput {
  slug: String!
}

type PaginateRes {
  products: [Product!]!
  totalPages: Int
  count: Int
}

type Query {
  products(paginate: Paginate): PaginateRes!
  products(options: ProductsOption): PaginateRes!
  product(input: ProductInput!): Product!
}