type Product {
  title: String!
  sku: ID!
  slug: ID!
  subtitle: String
  description: String
  shortDescription: String
  price: Float!
  discountedPrice: Float
  images: [String]!
  tags: [String]
  category: Category!
  reviews: [Review]
}

input ProductsOption {
  page: Int
  itemsPerPage: Int
  search: String
}

input ProductsRelatedOption {
  limit: Int
  slug: String!
}

input RandomProductsOption {
  limit: Int
}

input ProductInput {
  slug: String!
}

type ProductsRes {
  items: [Product!]!
  totalPages: Int
  count: Int
}

extend type Query {
  products(options: ProductsOption): ProductsRes!
  randomProducts(options: RandomProductsOption!): [Product!]!
  relatedProducts(options: ProductsRelatedOption!): [Product!]!
  product(input: ProductInput!): Product!
}