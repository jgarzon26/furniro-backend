type Product {
  id: ID
  title: String!
  sku: String!
  slug: String!
  subtitle: String
  description: String
  shortDescription: String
  price: Float!
  discountedPrice: Float
  images: [String]!
  tags: [String]
  reviews: [Review]
}

input ProductsOption {
  page: Int
  itemsPerPage: Int
  search: String
}

input ProductInput {
  slug: String!
}

type ProductsRes {
  items: [Product!]!
  totalPages: Int
  count: Int
}

extend type Query {
  products(options: ProductsOption): ProductsRes!
  product(input: ProductInput!): Product!
}