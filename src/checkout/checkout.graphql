enum CheckoutStatus {
  PENDING
  PROCESSING
  SHIPPED
  DELIVERED
  COMPLETED
  FAILED
  CANCELLED
}

type Checkout {
  id: ID
  items: [CheckoutItem!]!
  status: CheckoutStatus!
}

type CheckoutItem {
  product: Product!
  quantity: Int!
  price: Float!
}

input CheckoutInputType {
  sku: String!
  quantity: Int!
}

input AddCheckoutInput {
  items: [CheckoutInputType!]!
  address: String!
}

input ChangeOrderStatusInput {
  orderId: ID!
  status: CheckoutStatus!
}

extend type Query {
  checkout: Checkout!
}

extend type Mutation {
  checkout(input: AddCheckoutInput!): Checkout!
  orderStatus(input: ChangeOrderStatusInput!): Boolean
}